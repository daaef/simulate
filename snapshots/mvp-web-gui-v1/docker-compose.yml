services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      SIMULATOR_WORKDIR: /workspace
      SIMULATOR_PROJECT_DIR: /workspace/simulate
      RUN_DB_PATH: /workspace/simulate/runs/web-gui.sqlite
      RUN_LOG_DIR: /workspace/simulate/runs/web-gui
      WEB_CORS_ORIGINS: "*"
    volumes:
      - ./:/workspace/simulate

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./web:/app
      - /app/node_modules

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

