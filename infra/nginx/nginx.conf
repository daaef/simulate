events {}

http {
  # Resolve Docker service names via embedded DNS and refresh regularly
  # so proxy targets survive container recreation / IP churn.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location /api/ {
      set $api_upstream http://api:8000;
      proxy_pass $api_upstream;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /healthz {
      set $api_upstream http://api:8000;
      proxy_pass $api_upstream/healthz;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_set_header Host $host;
    }

    location / {
      set $web_upstream http://web:3000;
      proxy_pass $web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
