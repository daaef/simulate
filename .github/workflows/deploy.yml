name: Deploy Simulator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.SIMULATOR_DEPLOY_PATH }}
          REPO_URL: git@github.com:Fainzy-Technologies/simulator.git

          SIM_ENV: ${{ vars.SIM_ENV }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          WEB_CORS_ORIGINS: ${{ vars.WEB_CORS_ORIGINS }}
          SIM_AUTH_DISABLED: ${{ vars.SIM_AUTH_DISABLED }}

          SIMULATOR_HOST_BIND: ${{ vars.SIMULATOR_HOST_BIND }}
          SIMULATOR_HOST_PORT: ${{ vars.SIMULATOR_HOST_PORT }}

          SIMULATOR_SESSION_COOKIE_NAME: ${{ vars.SIMULATOR_SESSION_COOKIE_NAME }}
          SIMULATOR_SESSION_MAX_AGE_SECONDS: ${{ vars.SIMULATOR_SESSION_MAX_AGE_SECONDS }}
          SIMULATOR_SESSION_COOKIE_SECURE: ${{ vars.SIMULATOR_SESSION_COOKIE_SECURE }}
          SIMULATOR_SESSION_COOKIE_SAMESITE: ${{ vars.SIMULATOR_SESSION_COOKIE_SAMESITE }}
          SIMULATOR_EXTERNAL_BASE_URL: ${{ vars.SIMULATOR_EXTERNAL_BASE_URL }}

          SIMULATOR_WEBHOOK_PROJECT_SECRETS: ${{ secrets.SIMULATOR_WEBHOOK_PROJECT_SECRETS }}
          SIMULATOR_WEBHOOK_REPO_ALLOWLIST: ${{ vars.SIMULATOR_WEBHOOK_REPO_ALLOWLIST }}
          SIMULATOR_GITHUB_STATUS_CONTEXT: ${{ vars.SIMULATOR_GITHUB_STATUS_CONTEXT }}
          SIMULATOR_GITHUB_STATUS_TOKEN: ${{ secrets.SIMULATOR_GITHUB_STATUS_TOKEN }}
          SIMULATOR_WORKFLOW_RUN_DEFAULT_ENVIRONMENT: ${{ vars.SIMULATOR_WORKFLOW_RUN_DEFAULT_ENVIRONMENT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TLS_MODE: ${{ vars.SMTP_TLS_MODE }}

        with:
          host: ${{ secrets.SIMULATOR_DEPLOY_HOST }}
          username: ${{ secrets.SIMULATOR_DEPLOY_USERNAME }}
          key: ${{ secrets.SIMULATOR_DEPLOY_SSH_KEY }}
          port: ${{ secrets.SIMULATOR_DEPLOY_PORT || '22' }}
          envs: DEPLOY_PATH,REPO_URL,SIM_ENV,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,DATABASE_URL,JWT_SECRET_KEY,WEB_CORS_ORIGINS,SIM_AUTH_DISABLED,SIMULATOR_HOST_BIND,SIMULATOR_HOST_PORT,SIMULATOR_SESSION_COOKIE_NAME,SIMULATOR_SESSION_MAX_AGE_SECONDS,SIMULATOR_SESSION_COOKIE_SECURE,SIMULATOR_SESSION_COOKIE_SAMESITE,SIMULATOR_EXTERNAL_BASE_URL,SIMULATOR_WEBHOOK_PROJECT_SECRETS,SIMULATOR_WEBHOOK_REPO_ALLOWLIST,SIMULATOR_GITHUB_STATUS_CONTEXT,SIMULATOR_GITHUB_STATUS_TOKEN,SIMULATOR_WORKFLOW_RUN_DEFAULT_ENVIRONMENT,STRIPE_SECRET_KEY,SMTP_HOST,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,SMTP_TLS_MODE
          command_timeout: 45m
          script: |
            set -euo pipefail

            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker is not installed on target host"
              exit 1
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose plugin is not available on target host"
              exit 1
            fi

            TARGET_PATH="${DEPLOY_PATH:-/root/simulator}"

            mkdir -p "$TARGET_PATH"

            if [ ! -d "$TARGET_PATH/.git" ]; then
              echo "Repository missing, cloning into $TARGET_PATH"
              git clone "$REPO_URL" "$TARGET_PATH"
            fi

            cd "$TARGET_PATH"

            cleanup_on_error() {
              echo "Deployment failed. Container status:"
              docker compose -f docker-compose.prod.yml ps || true
              echo "Recent API logs:"
              docker compose -f docker-compose.prod.yml logs --tail 80 api || true
              echo "Recent web logs:"
              docker compose -f docker-compose.prod.yml logs --tail 80 web || true
              echo "Recent nginx logs:"
              docker compose -f docker-compose.prod.yml logs --tail 80 nginx || true
            }
            trap 'echo "FAILED at line $LINENO: $BASH_COMMAND"; cleanup_on_error' ERR

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "Writing production .env from GitHub Actions variables and secrets..."

            cat > .env <<EOF
            SIM_ENV=${SIM_ENV}

            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DATABASE_URL=${DATABASE_URL}

            JWT_SECRET_KEY=${JWT_SECRET_KEY}
            WEB_CORS_ORIGINS=${WEB_CORS_ORIGINS}
            SIM_AUTH_DISABLED=${SIM_AUTH_DISABLED}

            SIMULATOR_HOST_BIND=${SIMULATOR_HOST_BIND}
            SIMULATOR_HOST_PORT=${SIMULATOR_HOST_PORT}

            SIMULATOR_SESSION_COOKIE_NAME=${SIMULATOR_SESSION_COOKIE_NAME}
            SIMULATOR_SESSION_MAX_AGE_SECONDS=${SIMULATOR_SESSION_MAX_AGE_SECONDS}
            SIMULATOR_SESSION_COOKIE_SECURE=${SIMULATOR_SESSION_COOKIE_SECURE}
            SIMULATOR_SESSION_COOKIE_SAMESITE=${SIMULATOR_SESSION_COOKIE_SAMESITE}
            SIMULATOR_EXTERNAL_BASE_URL=${SIMULATOR_EXTERNAL_BASE_URL}

            SIMULATOR_WEBHOOK_PROJECT_SECRETS=${SIMULATOR_WEBHOOK_PROJECT_SECRETS}
            SIMULATOR_WEBHOOK_REPO_ALLOWLIST=${SIMULATOR_WEBHOOK_REPO_ALLOWLIST}
            SIMULATOR_WORKFLOW_RUN_DEFAULT_ENVIRONMENT=${SIMULATOR_WORKFLOW_RUN_DEFAULT_ENVIRONMENT:-production}
            SIMULATOR_GITHUB_STATUS_CONTEXT=${SIMULATOR_GITHUB_STATUS_CONTEXT}
            SIMULATOR_GITHUB_STATUS_TOKEN=${SIMULATOR_GITHUB_STATUS_TOKEN}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}

            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_USERNAME=${SMTP_USERNAME}
            SMTP_PASSWORD=${SMTP_PASSWORD}
            SMTP_TLS_MODE=${SMTP_TLS_MODE}
            EOF

            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env

            echo "Building production images..."
            docker compose -f docker-compose.prod.yml build

            echo "Starting/updating production stack..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            HOST_PORT="$(grep -E '^SIMULATOR_HOST_PORT=' .env | tail -1 | cut -d '=' -f2- | tr -d '"' || true)"
            if [ -z "$HOST_PORT" ]; then
              HOST_PORT="8090"
            fi

            echo "Running health check on 127.0.0.1:${HOST_PORT}/healthz"
            HEALTH_OK=0
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${HOST_PORT}/healthz" >/dev/null; then
                HEALTH_OK=1
                break
              fi
              sleep 2
            done

            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "ERROR: health check failed after deployment"
              exit 1
            fi

            echo "Deployment successful"
            docker compose -f docker-compose.prod.yml ps
